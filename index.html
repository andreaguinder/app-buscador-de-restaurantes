    <div class="container-nav">
      <div class="buscador">
        <form action="/buscar" method="GET">
          <input type="search" id="mi-busqueda" name="q" placeholder="Escribí acá...">
          <i class="fa-solid fa-magnifying-glass"></i>
        </form>
      </div>



      <nav id="site__nav" class="site__nav">
        <ul>
          <li class="mis-favoritos-fantasma"><a href="#mis-favoritos"

          </li>
          <li class="button-login-no"><button id="btn-iniciar-sesion" class="btn active">Iniciar sesión</button></li>
          <li class="button-login-si invisible"></li>

          <div class="theme-switch-wrapper">
            <input type="checkbox" id="theme-checkbox" class="theme-checkbox">
            <label for="theme-checkbox" class="theme-label" aria-label="Cambiar modo de color">
              <i class="fas fa-sun"></i>
              <i class="fas fa-moon"></i>
            </label>
          </div>
        </ul>


      </nav>
    </div>

          <img src="./img/logo-fondo-blanco.png" alt="Logo Qué vamos a comer?">
        </div>

    <!-- Modal Iniciar Sesión -->
    <section>
      <div class="modal-container-sesion modal-invisible">
        <div class="modal-overlay">
          <div id="modal-inicio-sesion" class="modal-inicio-sesion modal">
            <p class="title">Iniciar sesión</p>
            <div class="btn-close btn-close-general"><i class="fa-solid fa-xmark"></i></div>
            <form id="form-modal-inicio">
              <div class="form-group">
                <label for="usuario">Nombre de usuario</label>
                <input type="text" id="usuario" name="usuario" placeholder="Escribí tu nombre..." value="" />
              </div>

              <div class="form-group password">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Escribí tu contraseña..." value="" />
              </div>
              <div class="mensaje-error invisible">COMPLETE LOS DATOS</div>
              <button id="ingresar" type="submit" class="btn">Ingresar</button>
            </form>
          </div>
        </div>
      </div>
    </section>
    <!-- Termina el MOdal de Inicio de sesión -->


    <!-- Modal Ver detalles de cards con tabs -->
    <section>
      <div class="modal-mas-informacion modal-invisible">

              <div class="ubicacion"></div>
            </div>

            <div id="tab-opiniones" class="opiniones invisible">

              <div class="modal-body-opiniones">
                <div class="opinion1 opinion">

                </div>

                <div class="opinion3 opinion">

                </div>

                <div class="opinion4 opinion">

                </div>

            </div>
